name: Trove
options:
  bundleIdPrefix: com.shimondeitel.trove
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Trove:
    type: application
    platform: iOS
    sources:
      - path: Trove
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trove
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Trove/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TroveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TroveTests
      - path: Trove.storekit
    dependencies:
      - target: Trove
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trove.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TroveUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TroveUITests
    dependencies:
      - target: Trove
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trove.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Trove:
    build:
      targets:
        Trove: all
        TroveTests: [test]
        TroveUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Trove.storekit
    test:
      config: Debug
      storeKitConfiguration: Trove.storekit
      targets:
        - TroveTests
        - TroveUITests
    archive:
      config: Release
